<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>USTOZPRO - Cloud Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #050714;
            color: #f8fafc;
            min-height: 100vh;
        }
        .bg-scene { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: drift 12s infinite alternate; }
        .orb1 { width: 600px; height: 600px; background: radial-gradient(circle, #6366f1, transparent 70%); top: -200px; left: -150px; }
        .orb2 { width: 500px; height: 500px; background: radial-gradient(circle, #8b5cf6, transparent 70%); bottom: -100px; right: -100px; animation-delay: -4s; }
        .orb3 { width: 400px; height: 400px; background: radial-gradient(circle, #06b6d4, transparent 70%); top: 40%; left: 40%; animation-delay: -8s; opacity: 0.2; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,60px) scale(1.1); } }
        
        .screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; }
        
        #loginScreen { align-items: center; justify-content: center; padding: 20px; }
        .login-wrap { width: 100%; max-width: 400px; animation: fadeUp 0.6s ease; }
        .brand-orb {
            width: 80px; height: 80px; border-radius: 24px; margin: 0 auto 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 900;
        }
        .brand-name { font-size: 32px; font-weight: 900; text-align: center; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .role-tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; margin-bottom: 24px; }
        .role-tab {
            flex: 1; padding: 9px 8px; border-radius: 9px; border: none;
            background: transparent; color: #94a3b8; font-weight: 600; cursor: pointer;
        }
        .role-tab.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
        
        .field input {
            width: 100%; padding: 13px 16px; margin-bottom: 16px;
            background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; color: #fff; font-size: 14px;
            outline: none;
        }
        .field input:focus { border-color: #6366f1; }
        
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
            border: none; border-radius: 12px; color: #fff; font-weight: 700;
            cursor: pointer;
        }
        
        .topbar {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: rgba(5,7,20,0.85); backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            position: sticky; top: 0; z-index: 100;
        }
        .tb-logo {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900;
        }
        .tb-title { flex: 1; font-weight: 800; background: linear-gradient(135deg, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .online-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-left: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .btn-exit { padding: 7px 14px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; color: #f87171; cursor: pointer; }
        
        .nav-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 16px; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .ntab {
            padding: 8px 20px; border-radius: 99px; white-space: nowrap;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; font-weight: 600; cursor: pointer;
        }
        .ntab.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; }
        
        .content { flex: 1; padding: 16px; overflow-y: auto; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.08); }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .card-sub { font-size: 12px; color: #94a3b8; }
        
        .sg { display: grid; gap: 12px; margin-bottom: 16px; }
        .sg-2 { grid-template-columns: repeat(2, 1fr); }
        .sg-4 { grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 500px) { .sg-4 { grid-template-columns: repeat(4, 1fr); } }
        .scard {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 16px; text-align: center;
        }
        .sv { font-size: 28px; font-weight: 800; font-family: monospace; }
        .sl { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .sv-indigo { color: #a5b4fc; }
        .sv-green { color: #34d399; }
        .sv-amber { color: #fcd34d; }
        .sv-cyan { color: #67e8f9; }
        
        .srow { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.25); border-radius: 12px; margin-bottom: 8px; }
        .avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .sinfo { flex: 1; }
        .sname { font-weight: 600; }
        .smeta { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .mark-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid; background: rgba(255,255,255,0.05); color: #94a3b8; border-color: rgba(255,255,255,0.1); }
        .mb-marked { background: rgba(16,185,129,0.15); color: #34d399; border-color: rgba(16,185,129,0.3); }
        
        .badge { display: inline-block; padding: 3px 9px; border-radius: 99px; font-size: 10px; font-weight: 700; }
        .b-green { background: rgba(16,185,129,0.15); color: #34d399; }
        .b-amber { background: rgba(245,158,11,0.15); color: #fcd34d; }
        
        .chat-body { min-height: 300px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .cmsg { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 13px; }
        .cmsg.out { align-self: flex-end; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-bottom-right-radius: 4px; }
        .cmsg.in { align-self: flex-start; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .cmsg-who { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 4px; }
        .cmsg-time { font-size: 9px; color: #64748b; margin-top: 4px; }
        .chat-row { display: flex; gap: 8px; }
        .chat-row input { flex: 1; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; }
        .btn-send { padding: 12px 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 12px; color: #fff; cursor: pointer; }
        
        .toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { padding: 10px 20px; border-radius: 12px; font-size: 13px; color: #fff; backdrop-filter: blur(20px); animation: fadeIn 0.3s ease; }
        .toast.success { background: rgba(16,185,129,0.9); }
        .toast.warning { background: rgba(245,158,11,0.9); }
        .toast.error { background: rgba(239,68,68,0.9); }
        .toast.info { background: rgba(99,102,241,0.9); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .view { display: none; }
        .view.active { display: block; animation: fadeUp 0.3s ease; }
        .empty { text-align: center; padding: 40px; color: #64748b; }
        
        .pbar { height: 5px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; margin: 6px 0 3px; }
        .pfill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
        .pf-green { background: linear-gradient(90deg, #10b981, #34d399); }
        
        .add-form { display: none; margin-top: 16px; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px; }
        .add-form.open { display: block; }
        .fg { display: grid; gap: 12px; }
        .fg2 { grid-template-columns: repeat(2, 1fr); }
        @media (max-width: 480px) { .fg2 { grid-template-columns: 1fr; } }
        .finput { width: 100%; padding: 10px 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; }
    </style>
</head>
<body>
<div class="bg-scene"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
    <div class="login-wrap">
        <div class="brand-orb">UP</div>
        <div class="brand-name">USTOZPRO</div>
        <div class="brand-sub" style="text-align:center; margin-top:4px;">Cloud Education Platform</div>
        <div class="glass" style="margin-top: 24px; padding: 28px;">
            <div class="role-tabs">
                <button class="role-tab" onclick="setRole('dasturchi')">👨‍💻 Dasturchi</button>
                <button class="role-tab active" onclick="setRole('menejer')">📊 Menejer</button>
                <button class="role-tab" onclick="setRole('oqutuvchi')">📚 O'qituvchi</button>
                <button class="role-tab" onclick="setRole('oquvchi')">🎓 O'quvchi</button>
            </div>
            <div class="field"><input type="text" id="loginIn" placeholder="Login" autocomplete="off"></div>
            <div class="field"><input type="password" id="passIn" placeholder="Parol" onkeypress="if(event.key==='Enter')doLogin()"></div>
            <button class="btn-login" onclick="doLogin()">Kirish →</button>
            <div style="text-align: center; margin-top: 16px; font-size: 11px; color: #475569;">
                Demo: dasturchi/dev123 | menejer/men123 | ali/tch123 | bobur/stu123
            </div>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" class="screen">
    <div class="topbar">
        <div class="tb-logo">UP</div>
        <div class="tb-title">USTOZPRO <span id="onlineBadge" class="online-indicator"></span></div>
        <div id="tbName" style="font-size:13px;"></div>
        <button class="btn-exit" onclick="doLogout()">Chiqish</button>
    </div>
    <div class="nav-scroll" id="navTabs"></div>
    <div class="content"><div id="viewContainer"></div></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ============ SUPABASE KONFIGURATSIYA ============
// 👇👇👇 Supabase dashboarddan olingan ma'lumotlarni qo'ying!
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';  // O'zgartiring!
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';  // O'zgartiring!

// ============ ABLY API KEY ============
const ABLY_API_KEY = 'GSQZcQ.qw01Ow:t1CiUe_16VfC_B4L56oe5BT3tGuwvT6WkbxTDZ5dsSk';

// Initialize Supabase
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============ GLOBAL ============
let CU = null;
let selectedRole = 'menejer';
let ably = null;
let chatChannel = null;

// ============ HELPERS ============
function toast(msg, type = 'info') {
    const wrap = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.style.opacity = '0', 2500);
    setTimeout(() => t.remove(), 2900);
}

// ============ ABLY REAL-TIME ============
async function initAbly() {
    try {
        ably = new Ably.Realtime({ key: ABLY_API_KEY });
        await new Promise((resolve) => { ably.connection.once('connected', resolve); });
        console.log('✅ Ably connected');
        document.getElementById('onlineBadge')?.classList.add('online-indicator');
        
        chatChannel = ably.channels.get('ustozpro:chat');
        await chatChannel.subscribe('message', (msg) => {
            displayMessage(msg.data);
        });
        
    } catch(err) { console.error('Ably error:', err); }
}

async function sendMessage(text) {
    if (!chatChannel) return false;
    const msg = {
        id: Date.now(),
        userId: CU.id,
        userName: CU.name,
        userRole: CU.role,
        text: text,
        time: new Date().toISOString()
    };
    await chatChannel.publish('message', msg);
    displayMessage(msg);
    // Supabase'ga saqlash
    await supabase.from('messages').insert([{
        user_id: CU.id,
        user_name: CU.name,
        user_role: CU.role,
        message: text
    }]);
    return true;
}

function displayMessage(msg) {
    const container = document.getElementById('chatMessages');
    if (!container) return;
    const isOwn = msg.userId === CU?.id;
    const div = document.createElement('div');
    div.className = `cmsg ${isOwn ? 'out' : 'in'}`;
    div.innerHTML = `${!isOwn ? `<div class="cmsg-who">${msg.userName} (${msg.userRole})</div>` : ''}${msg.text}<div class="cmsg-time">${new Date(msg.time).toLocaleTimeString()}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// ============ LOGIN ============
function setRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-tab').forEach((t, i) => {
        const roles = ['dasturchi', 'menejer', 'oqutuvchi', 'oquvchi'];
        t.classList.toggle('active', roles[i] === role);
    });
}

async function doLogin() {
    const login = document.getElementById('loginIn').value.trim();
    const pass = document.getElementById('passIn').value.trim();
    if (!login || !pass) { toast('Login va parol kiriting', 'warning'); return; }
    
    // Supabase'dan user tekshirish
    const { data, error } = await supabase
        .from('users')
        .select('*')
        .eq('login', login)
        .eq('password', pass)
        .eq('role', selectedRole);
    
    if (error || !data || data.length === 0) {
        toast('Login yoki parol xato!', 'error');
        return;
    }
    
    CU = data[0];
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('appScreen').classList.add('active');
    document.getElementById('tbName').textContent = CU.name;
    
    await initAbly();
    buildNav();
    toast(`Xush kelibsiz, ${CU.name}!`, 'success');
}

function doLogout() {
    CU = null;
    if (ably) ably.close();
    document.getElementById('appScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('loginIn').value = '';
    document.getElementById('passIn').value = '';
}

// ============ NAVIGATION ============
const NAV = {
    dasturchi: [
        { id: 'dashboard', label: '📊 Dashboard' },
        { id: 'users', label: '👥 Foydalanuvchilar' },
        { id: 'payments', label: '💰 To\'lovlar' },
        { id: 'chat', label: '💬 Chat' }
    ],
    menejer: [
        { id: 'dashboard', label: '📊 Dashboard' },
        { id: 'teachers', label: '👨‍🏫 O\'qituvchilar' },
        { id: 'students', label: '🎓 O\'quvchilar' },
        { id: 'payments', label: '💰 To\'lovlar' },
        { id: 'chat', label: '💬 Chat' }
    ],
    oqutuvchi: [
        { id: 'attendance', label: '📋 Davomat' },
        { id: 'journal', label: '📖 Jurnal' },
        { id: 'chat', label: '💬 Chat' }
    ],
    oquvchi: [
        { id: 'myAttendance', label: '📅 Davomatim' },
        { id: 'myPayment', label: '💰 To\'lovim' },
        { id: 'chat', label: '💬 Chat' }
    ]
};

function buildNav() {
    const wrap = document.getElementById('navTabs');
    wrap.innerHTML = '';
    const items = NAV[CU.role] || [];
    items.forEach((item, i) => {
        const btn = document.createElement('button');
        btn.className = 'ntab' + (i === 0 ? ' active' : '');
        btn.textContent = item.label;
        btn.onclick = () => {
            wrap.querySelectorAll('.ntab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadView(item.id);
        };
        wrap.appendChild(btn);
    });
    if (items.length) loadView(items[0].id);
}

function loadView(viewId) {
    const container = document.getElementById('viewContainer');
    if (viewId === 'dashboard') renderDashboard(container);
    else if (viewId === 'users') renderUsers(container);
    else if (viewId === 'payments') renderPayments(container);
    else if (viewId === 'teachers') renderTeachers(container);
    else if (viewId === 'students') renderStudents(container);
    else if (viewId === 'attendance') renderAttendance(container);
    else if (viewId === 'journal') renderJournal(container);
    else if (viewId === 'myAttendance') renderMyAttendance(container);
    else if (viewId === 'myPayment') renderMyPayment(container);
    else if (viewId === 'chat') renderChat(container);
}

// ============ RENDER FUNCTIONS (soddalashtirilgan) ============
function renderDashboard(container) {
    container.innerHTML = `
        <div class="card">
            <div class="card-title">📊 Dashboard</div>
            <div class="card-sub">Cloud-based platform | Supabase + Ably</div>
            <div style="margin-top:16px; padding:12px; background:rgba(0,0,0,0.2); border-radius:12px;">
                <div>✅ Ma'lumotlar bazasi: Supabase (PostgreSQL)</div>
                <div>🔴 Real-time: Ably</div>
                <div>👤 Hozirgi foydalanuvchi: ${CU?.name} (${CU?.role})</div>
                <div>🌐 Barcha qurilmalarda bir xil ma'lumotlar!</div>
            </div>
        </div>
    `;
}

function renderUsers(container) {
    container.innerHTML = `<div class="card"><div class="card-title">👥 Foydalanuvchilar</div><div class="empty">Supabase orqali yuklanmoqda...</div></div>`;
    loadUsersFromDB(container);
}

async function loadUsersFromDB(container) {
    const { data, error } = await supabase.from('users').select('*').neq('role', 'dasturchi');
    if (error) { container.innerHTML = `<div class="card"><div class="empty">Xatolik: ${error.message}</div></div>`; return; }
    
    container.innerHTML = `
        <div class="card">
            <div class="card-title">👥 Foydalanuvchilar</div>
            <button class="btn-login" style="margin:16px 0; padding:10px;" onclick="showAddUserForm()">+ Yangi qo'shish</button>
            <div id="addUserFormSupabase" class="add-form">
                <div class="fg fg2">
                    <input class="finput" id="newNameSup" placeholder="Ism">
                    <input class="finput" id="newLoginSup" placeholder="Login">
                </div>
                <div class="fg fg2">
                    <input class="finput" type="password" id="newPassSup" placeholder="Parol">
                    <select class="finput" id="newRoleSup">
                        <option value="menejer">Menejer</option>
                        <option value="oqutuvchi">O'qituvchi</option>
                        <option value="oquvchi">O'quvchi</option>
                    </select>
                </div>
                <button class="btn-login" style="padding:8px;" onclick="addUserToSupabase()">✅ Saqlash</button>
            </div>
            ${data.map(u => `
                <div class="srow">
                    <div class="avatar">${u.name[0]}</div>
                    <div class="sinfo"><div class="sname">${u.name}</div><div class="smeta">${u.role} | ${u.login}</div></div>
                </div>
            `).join('')}
        </div>
    `;
}

async function addUserToSupabase() {
    const name = document.getElementById('newNameSup').value.trim();
    const login = document.getElementById('newLoginSup').value.trim();
    const pass = document.getElementById('newPassSup').value.trim();
    const role = document.getElementById('newRoleSup').value;
    
    if (!name || !login || !pass) { toast('To\'ldiring!', 'warning'); return; }
    
    const { error } = await supabase.from('users').insert([{ name, login, password: pass, role }]);
    if (error) { toast('Xatolik: ' + error.message, 'error'); return; }
    
    toast(`${name} qo'shildi!`, 'success');
    document.getElementById('addUserFormSupabase').classList.remove('open');
    loadView('users');
}

function renderTeachers(container) {
    container.innerHTML = `<div class="card"><div class="card-title">👨‍🏫 O'qituvchilar</div><div class="empty">Yuklanmoqda...</div></div>`;
    loadTeachersFromDB(container);
}

async function loadTeachersFromDB(container) {
    const { data, error } = await supabase.from('users').select('*').eq('role', 'oqutuvchi');
    if (error) return;
    container.innerHTML = `<div class="card"><div class="card-title">👨‍🏫 O'qituvchilar</div>${data.map(t => `<div class="srow"><div class="avatar">${t.name[0]}</div><div class="sinfo"><div class="sname">${t.name}</div><div class="smeta">${t.subject || 'Fan yo\'q'}</div></div></div>`).join('')}</div>`;
}

function renderStudents(container) {
    container.innerHTML = `<div class="card"><div class="card-title">🎓 O'quvchilar</div><div class="empty">Yuklanmoqda...</div></div>`;
    loadStudentsFromDB(container);
}

async function loadStudentsFromDB(container) {
    const { data, error } = await supabase.from('users').select('*').eq('role', 'oquvchi');
    if (error) return;

async function renderChat(container) {
    container.innerHTML = `
        <div class="card">
            <div class="card-title">💬 Ommaviy chat</div>
            <div class="card-sub">Real-time | Barcha qurilmalarda sinxron</div>
            <div class="chat-body" id="chatMessages"></div>
            <div class="chat-row">
                <input type="text" id="chatInput" placeholder="Xabar yozing..." onkeypress="if(event.key==='Enter')sendChatMsg()">
                <button class="btn-send" onclick="sendChatMsg()">➤</button>
            </div>
        </div>
    `;
    // Eski xabarlarni Supabase'dan yuklash
    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
    const container2 = document.getElementById('chatMessages');
    if (container2 && data) {
        container2.innerHTML = '';
        data.forEach(msg => {
            const div = document.createElement('div');
            div.className = `cmsg ${msg.user_id === CU?.id ? 'out' : 'in'}`;
            div.innerHTML = `${msg.user_id !== CU?.id ? `<div class="cmsg-who">${msg.user_name} (${msg.user_role})</div>` : ''}${msg.message}<div class="cmsg-time">${new Date(msg.created_at).toLocaleTimeString()}</div>`;
            container2.appendChild(div);
        });
        container2.scrollTop = container2.scrollHeight;
    }
}

async function sendChatMsg() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await sendMessage(text);
}

}
